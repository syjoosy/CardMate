# .github/workflows/update-version.yml
name: Update version file

on:
  push:
    branches: [ main, release ]
    paths-ignore:
      - '**/version.py'  # избегаем циклов

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Get commit info
      id: commit
      run: |
        echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        echo "full=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
        echo "describe=$(git describe --tags --always --dirty)" >> $GITHUB_OUTPUT
        echo "branch=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_OUTPUT
    
    - name: Generate version.py
      run: |
        cat > version.py << 'EOF'
        # Auto-generated by GitHub Actions - DO NOT EDIT MANUALLY
        GIT_COMMIT_SHORT = "${{ steps.commit.outputs.short }}"
        GIT_COMMIT_FULL = "${{ steps.commit.outputs.full }}"
        GIT_DESCRIBE = "${{ steps.commit.outputs.describe }}"
        GIT_BRANCH = "${{ steps.commit.outputs.branch }}"
        EOF
    
    - name: Commit and push if changed
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add version.py
        git diff --staged --quiet || git commit -m "chore: update version.py [skip ci]"
        git push